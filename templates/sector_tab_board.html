<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>行业排行看板 · Tab版</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1420;--s:#171E2C;--b:#262F42;--t1:#EDEFF3;--t2:#8891A3;--t3:#5C6478;--acc:#4FB0A5;--fm:monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'IBM Plex Mono',var(--fm);-webkit-font-smoothing:antialiased}
.wrap{max-width:960px;margin:0 auto;padding:32px 20px 80px}
header{margin-bottom:24px;border-bottom:1px solid var(--b);padding-bottom:18px}
.eyebrow{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--t2);margin-bottom:6px}
h1{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;letter-spacing:-.01em}
.sub{font-size:11.5px;color:var(--t2);margin-top:8px;line-height:1.6;font-family:sans-serif}

/* 冷热图例 */
.legend{display:flex;align-items:center;gap:10px;margin-top:12px;font-size:11px;color:var(--t2)}
.lbar{width:160px;height:10px;border-radius:3px;background:linear-gradient(90deg,hsl(210,55%,36%),hsl(210,15%,42%),#54565a,hsl(4,15%,42%),hsl(4,60%,32%))}

/* Tab 导航 */
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.tab{padding:5px 12px;border-radius:20px;font-size:11.5px;border:1px solid var(--b);cursor:pointer;color:var(--t2);background:transparent;transition:all .18s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.tab.active{border-color:var(--acc);color:var(--t1);background:rgba(79,176,165,.1)}
.tab:hover:not(.active){border-color:var(--t2);color:var(--t1)}

/* 行业面板 */
.panel{display:none}
.panel.active{display:block}
.panel-head{padding:16px 20px 14px;border-radius:10px 10px 0 0;position:relative;margin-bottom:0}
.panel-name{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4)}
.panel-meta{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.panel-badge{position:absolute;top:16px;right:20px;font-size:22px;font-weight:600;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5)}

/* 表格 */
.tbl-wrap{background:var(--s);border-radius:0 0 10px 10px;border:1px solid var(--b);border-top:none;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:rgba(255,255,255,.04)}
th{padding:8px 14px;text-align:left;color:var(--t3);font-weight:500;font-size:10.5px;letter-spacing:.04em;border-bottom:1px solid var(--b)}
th.r,td.r{text-align:right}
td{padding:7px 14px;border-top:1px solid rgba(38,47,66,.6)}
tr:hover td{background:rgba(255,255,255,.02)}
.tr-mine td{background:rgba(255,220,80,.07)}
.tr-mine:hover td{background:rgba(255,220,80,.13)}
.rk{color:var(--t3);font-size:10.5px;min-width:28px}
.tk{font-weight:600;color:var(--t1);letter-spacing:.03em}
.mine-tag{display:inline-block;font-size:9px;padding:1px 4px;background:rgba(255,220,80,.22);color:#E8C840;border-radius:3px;margin-left:4px;vertical-align:middle}
.fb{display:inline-flex;gap:4px}
.fm-b,.fg-b,.fq-b{padding:1px 4px;border-radius:3px;font-size:9.5px}
.fm-b{background:rgba(227,168,59,.14);color:#E3A83B}
.fg-b{background:rgba(79,176,165,.14);color:#4FB0A5}
.fq-b{background:rgba(165,133,176,.14);color:#A585B0}
.sc{font-weight:500}

footer{margin-top:36px;padding-top:16px;border-top:1px solid var(--b);font-size:10.5px;color:var(--t3);line-height:1.8}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="eyebrow">美股 · 量化因子选股 · 分行业视图</div>
  <h1>行业排行看板</h1>
  <div class="sub">每个行业按综合得分排列全部股票。行业 Tab 的圆点颜色 = 该行业12个月涨幅中位数热度。<span style="color:var(--acc)">青色高亮行</span>为你持有的股票。</div>
  <div class="legend">
    <span>冷</span><div class="lbar"></div><span>暖</span>
    <span style="margin-left:12px;color:var(--t3)">· 热度 = 行业涨幅中位数</span>
  </div>
</header>

<div class="tabs" id="tabs"></div>
<div id="panels"></div>

<footer>
  数据截至 <span id="asof"></span> · 因子权重 动量40/成长30/质量30 · 因子分为行业内z-score<br>
  M=动量 G=成长 Q=质量 · 涨幅颜色:红=正涨幅,蓝=负涨幅,深浅反映幅度大小<br>
  本看板仅供策略研究,不构成投资建议。
</footer>
</div>

function heatColor(m) {
  if (m >= 0) {
    const t = Math.min(m/0.46, 1);
    return `hsl(4,${(12+t*48).toFixed(0)}%,${(44-t*16).toFixed(0)}%)`;
  } else {
    const t = Math.min(Math.abs(m)/0.10, 1);
    return `hsl(210,${(12+t*43).toFixed(0)}%,${(44-t*10).toFixed(0)}%)`;
  }
}

function dotColor(m) {
  return heatColor(m);
}

function retColor(r) {
  if (r == null) return 'var(--t2)';
  if (r >= 0) {
    const t = Math.min(r, 1);
    return `hsl(4,${(t*68).toFixed(0)}%,${(90-t*32).toFixed(0)}%)`;
  } else {
    const t = Math.min(Math.abs(r), 1);
    return `hsl(210,${(t*58).toFixed(0)}%,${(90-t*30).toFixed(0)}%)`;
  }
}

        <span class="fm-b">M${fmt(s.mom)}</span>
        <span class="fg-b">G${fmt(s.gro)}</span>
        <span class="fq-b">Q${fmt(s.qua)}</span>
      </span></td>
      <td class="r sc">${s.score.toFixed(2)}</td>
      <td class="r" style="color:${retColor(s.ret12m)}">${retFmt(s.ret12m)}</td>
    </tr>`;
  }).join('');

  const div = document.createElement('div');
  div.className = 'panel' + (i===0?' active':'');
  div.dataset.i = i;
  div.innerHTML = `
    <div class="panel-head" style="background:${heatColor(sec.medianMom)}">
      <div class="panel-name">${sec.sector}</div>
      <div class="panel-meta">${sec.count} 只股票 · 行业12月涨幅中位数</div>
      <div class="panel-badge">${(sec.medianMom*100).toFixed(0)}%</div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>代码</th>
          <th>因子 (行业内z-score)</th>
          <th class="r">综合得分</th>
          <th class="r">12月涨幅</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  panelsEl.appendChild(div);
});

// Tab 切换
tabsEl.addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.querySelector(`.panel[data-i="${btn.dataset.i}"]`).classList.add('active');
});
</script>
</body>
</html>
