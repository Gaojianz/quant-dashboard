name: Weekly Dashboard Update

on:
  schedule:
    # 每周六 UTC 22:00 (北京时间周日早上6点) 自动运行
    - cron: '0 22 * * 6'
  workflow_dispatch:
    # 也可以在 GitHub 网页上手动点击运行

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送到仓库

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests lxml

      - name: Download market data
        run: python scripts/download_data.py
        timeout-minutes: 25

      - name: Compute factors and generate dashboard
        run: python scripts/build_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Auto update: $(date -u '+%Y-%m-%d')"
          git push
